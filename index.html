<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scott Green's Web Space</title>
  
  <style>
    /*
    1. Set the background color to blue as requested.
    2. Use the 'Brush Script MT' cursive font.
    3. Ensure a clean, mobile-friendly layout.
    */
    body {
      background-color: darkturquoise;
      font-family: "Brush Script MT", cursive, sans-serif;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }
    header {
      padding: 40px 20px 20px;
      width: 100%;
    }
    h1 {
      font-size: 3.5em; /* Larger font for the title */
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
    }
    p {
      font-size: 1.2em;
    }
    nav {
      width: 100%;
      padding: 10px 0;
      margin-bottom: 20px;
      /* Style for the navigation bar */
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
      padding: 8px 15px;
      font-size: 1.6em;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      transition: background-color 0.3s, color 0.3s;
      display: inline-block; /* Allows padding and border */
    }
    nav a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
    }
    main {
      padding: 20px;
      max-width: 90%;
      width: 100%;
      box-sizing: border-box;
    }
    .image-placeholder {
      /* Styling for the custom placeholder element */
      width: 100%;
      max-width: 400px; 
      height: 300px;
      background-color: rgba(255, 255, 255, 0.1);
      border: 5px solid white;
      border-radius: 15px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 1.2em;
      line-height: 1.5;
    }
    .image-placeholder p {
      font-family: sans-serif;
      font-size: 0.8em;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 10px;
      text-align: center;
      padding: 0 10px;
    }
    @media (max-width: 600px) {
      nav a {
        display: block;
        margin: 10px 5px;
        font-size: 1.2em;
      }
      h1 {
        font-size: 2.5em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Scott Green's Web Space</h1>
    <p>Welcome to my corner of the web.</p>
    <p>scottgemails@Gmail.com</p>
  </header>

  <nav>
    <a href="autobiography.html">Autobiography</a>
    <a href="art.html">Art</a>
    <a href="publications.html">Publications</a>
  </nav>

  <main>
    
        
        <img src="me.jpg" alt="Scott's" class="image-placeholder" style="max-width:30%; height:auto;">
      
      
    </div>
  </main>
</body>
</html>
